<aside class="sidenav navbar navbar-vertical navbar-expand-xs border-0 border-radius-xl my-3 fixed-start ms-3" id="sidenav-main">
  <div class="sidenav-header">
    <i class="fas fa-times p-3 cursor-pointer text-secondary opacity-5 position-absolute end-0 top-0 d-none d-xl-none" aria-hidden="true" id="iconSidenav"></i>
    <a class="navbar-brand m-0" href="{{ url_for('home_blueprint.index') }}">
      <img src="{{ url_for('static', filename='assets/img/logo-ct-dark.png') }}" class="navbar-brand-img h-100" alt="Perpustakaan PNJ">
      <span class="ms-1 font-weight-bold">Perpustakaan PNJ</span>
    </a>
  </div>
  <hr class="horizontal dark mt-0">
  <div class="collapse navbar-collapse w-auto" id="sidenav-collapse-main">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link {% if segment == 'dashboard' %}active{% endif %}" href="{{ url_for('home_blueprint.index') }}">
          <span class="nav-link-text ms-1">Dashboard</span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if segment == 'books' %}active{% endif %}" href="{{ url_for('home_blueprint.books') }}">
          <span class="nav-link-text ms-1">Buku</span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if segment == 'admins' %}active{% endif %}" href="{{ url_for('home_blueprint.admins') }}">
          <span class="nav-link-text ms-1">Admin</span>
        </a>
      </li>
      {% if current_user.is_authenticated %}
      <li class="nav-item">
        <a class="nav-link {% if segment == 'profile' %}active{% endif %}" href="{{ url_for('home_blueprint.profile') }}">
          <span class="nav-link-text ms-1">Profile</span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="{{ url_for('authentication_blueprint.logout') }}">
          <span class="nav-link-text ms-1">Logout</span>
        </a>
      </li>
      {% else %}
      <li class="nav-item">
        <a class="nav-link" href="{{ url_for('authentication_blueprint.login') }}">
          <span class="nav-link-text ms-1">Login</span>
        </a>
      </li>
      {% endif %}
    </ul>
  </div>
</aside>
