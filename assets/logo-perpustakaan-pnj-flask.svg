      <line x1="512" y1="402" x2="512" y2="486" stroke="#94A3B8" stroke-width="4"/>
      <line x1="445" y1="428" x2="492" y2="428" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
      <line x1="445" y1="448" x2="492" y2="448" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
      <line x1="532" y1="428" x2="579" y2="428" stroke="#22C55E" stroke-width="4" stroke-linecap="round"/>
      <line x1="532" y1="448" x2="579" y2="448" stroke="#22C55E" stroke-width="4" stroke-linecap="round"/>
